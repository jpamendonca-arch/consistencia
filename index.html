<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consistência</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Sora:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0e;--surface:#141416;--surface2:#1c1c20;--border:#2a2a30;
  --text:#e8e8ec;--muted:#6b6b78;--green:#22c55e;--yellow:#eab308;
  --red:#ef4444;--accent:#7c6af7;
}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
#root{max-width:480px;margin:0 auto;min-height:100vh;}
.app{display:flex;flex-direction:column;min-height:100vh;}
.nav{display:flex;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:10;}
.nav-btn{flex:1;padding:13px 2px;font-size:10px;font-family:'JetBrains Mono',monospace;background:none;border:none;color:var(--muted);cursor:pointer;letter-spacing:0.04em;border-bottom:2px solid transparent;transition:all 0.2s;}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.main{flex:1;padding:20px 16px 100px;}
.rules-block{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;padding:14px 16px;margin-bottom:24px;}
.rules-title{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.15em;color:var(--accent);margin-bottom:10px;}
.rules-list{list-style:none;}
.rules-list li{font-size:12px;color:var(--muted);padding:3px 0;display:flex;gap:8px;}
.rules-list li span:first-child{color:var(--accent);font-family:'JetBrains Mono',monospace;}
.section-title{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.15em;color:var(--muted);margin-bottom:14px;text-transform:uppercase;}
.field{margin-bottom:16px;}
.field-label{display:block;font-size:13px;color:var(--text);margin-bottom:8px;}
.field-label span{color:var(--muted);font-size:11px;margin-left:4px;}
.checkbox-row{display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:6px;transition:border-color 0.15s;}
.checkbox-row:hover{border-color:var(--accent);}
.checkbox-row.checked{border-color:var(--green);background:#22c55e0d;}
.custom-checkbox{width:18px;height:18px;border:2px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;}
.checkbox-row.checked .custom-checkbox{border-color:var(--green);background:var(--green);}
.check-mark{color:#000;font-size:11px;font-weight:700;}
.slider-wrap{display:flex;align-items:center;gap:10px;}
.slider{flex:1;-webkit-appearance:none;appearance:none;height:4px;background:var(--surface2);border-radius:2px;outline:none;}
.slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid var(--bg);}
.slider-value{font-family:'JetBrains Mono',monospace;font-size:16px;color:var(--text);min-width:24px;text-align:right;}
.yn-row{display:flex;gap:8px;}
.yn-btn{flex:1;padding:10px;border:1px solid var(--border);background:var(--surface);border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);cursor:pointer;transition:all 0.15s;}
.yn-btn.selected-yes{border-color:var(--green);color:var(--green);background:#22c55e0d;}
.yn-btn.selected-no{border-color:var(--red);color:var(--red);background:#ef44440d;}
.obs-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Sora',sans-serif;font-size:13px;padding:10px 12px;resize:none;outline:none;transition:border-color 0.15s;line-height:1.5;}
.obs-input:focus{border-color:var(--accent);}
.obs-input::placeholder{color:var(--muted);}
.save-btn{width:100%;padding:14px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-family:'Sora',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:opacity 0.2s;margin-top:8px;}
.save-btn:hover{opacity:.85;}
.save-btn:disabled{opacity:.4;cursor:default;}
.sec-btn{width:100%;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Sora',sans-serif;font-size:13px;cursor:pointer;transition:all 0.2s;margin-top:8px;}
.sec-btn:hover{border-color:var(--accent);color:var(--accent);}
.sec-btn:disabled{opacity:.4;cursor:default;}
.success-msg{background:#22c55e15;border:1px solid var(--green);border-radius:8px;padding:12px 16px;color:var(--green);font-family:'JetBrains Mono',monospace;font-size:12px;text-align:center;margin-top:12px;}
.date-header{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:20px;letter-spacing:.1em;}
.exec-chips{display:flex;flex-wrap:wrap;gap:8px;}
.exec-chip{padding:8px 12px;border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--muted);cursor:pointer;transition:all 0.15s;background:var(--surface);}
.exec-chip.checked{border-color:var(--green);color:var(--green);background:#22c55e0d;}
.already-done{background:var(--surface);border:1px solid var(--green);border-radius:8px;padding:20px;text-align:center;margin-bottom:20px;}
.already-done-title{color:var(--green);font-family:'JetBrains Mono',monospace;font-size:12px;margin-bottom:8px;}
.already-done-sub{color:var(--muted);font-size:13px;}
.edit-link{color:var(--accent);background:none;border:none;cursor:pointer;font-size:12px;font-family:'JetBrains Mono',monospace;margin-top:8px;display:block;}
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.cal-nav{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:4px 10px;}
.cal-month{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-day-name{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);text-align:center;padding:4px 0;}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);background:var(--surface);border:1px solid var(--border);}
.cal-day.filled{background:var(--green);color:#000;border-color:var(--green);font-weight:700;}
.cal-day.trained{background:#7c6af722;border-color:var(--accent);}
.cal-day.filled.trained{background:var(--green);box-shadow:0 0 0 1px var(--accent);}
.cal-day.today{border-color:var(--accent);color:var(--accent);}
.cal-day.today.filled{border-color:var(--green);color:#000;}
.cal-day.empty-slot{background:none;border-color:transparent;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;}
.stat-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:4px;}
.stat-value{font-size:24px;font-family:'JetBrains Mono',monospace;color:var(--text);}
.stat-value.good{color:var(--green);}
.stat-value.warn{color:var(--yellow);}
.stat-value.bad{color:var(--red);}
.status-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;font-family:'JetBrains Mono',monospace;font-size:11px;margin-bottom:20px;border:1px solid;}
.status-badge.green{color:var(--green);border-color:var(--green);background:#22c55e0d;}
.status-badge.yellow{color:var(--yellow);border-color:var(--yellow);background:#eab3080d;}
.status-badge.red{color:var(--red);border-color:var(--red);background:#ef44440d;}
.ai-block{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;padding:16px;margin-bottom:16px;}
.ai-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);margin-bottom:10px;letter-spacing:.1em;}
.ai-text{font-size:13px;color:var(--text);line-height:1.7;white-space:pre-wrap;}
.month-stat{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);}
.month-stat:last-of-type{border-bottom:none;}
.month-stat-label{font-size:13px;color:var(--muted);}
.month-stat-value{font-family:'JetBrains Mono',monospace;font-size:16px;color:var(--text);}
.treino-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px;}
.treino-block-title{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:.15em;margin-bottom:6px;}
.treino-block-sub{font-size:12px;color:var(--muted);margin-bottom:16px;}
.treino-seq{font-family:'JetBrains Mono',monospace;font-size:32px;color:var(--text);text-align:center;padding:20px 0;letter-spacing:8px;}
.treino-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:22px;padding:12px;text-align:center;outline:none;letter-spacing:6px;margin-bottom:12px;}
.treino-input:focus{border-color:var(--accent);}
.treino-input::placeholder{color:var(--border);font-size:14px;letter-spacing:normal;}
.treino-instrucao{font-size:15px;color:var(--text);text-align:center;line-height:1.6;padding:16px 0;}
.treino-timer{font-family:'JetBrains Mono',monospace;font-size:48px;color:var(--accent);text-align:center;padding:20px 0;}
.timer-bar{width:100%;height:4px;background:var(--surface2);border-radius:2px;margin:12px 0;}
.timer-bar-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 1s linear;}
.treino-done{text-align:center;padding:30px 0;}
.treino-done-title{font-family:'JetBrains Mono',monospace;font-size:18px;color:var(--green);margin-bottom:8px;}
.bloco-nav{display:flex;gap:8px;margin-bottom:20px;}
.bloco-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:all 0.2s;}
.bloco-dot.active{background:var(--accent);}
.bloco-dot.done{background:var(--green);}
.feedback-ok{color:var(--green);font-family:'JetBrains Mono',monospace;font-size:12px;text-align:center;margin-bottom:8px;}
.feedback-err{color:var(--red);font-family:'JetBrains Mono',monospace;font-size:12px;text-align:center;margin-bottom:8px;}
.progress-row{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:4px;}
.export-block{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-top:24px;}
.export-title{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.15em;margin-bottom:12px;}
.export-row{display:flex;gap:8px;}
.export-btn{flex:1;padding:11px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;transition:all 0.2s;display:flex;flex-direction:column;align-items:center;gap:4px;}
.export-btn:hover{border-color:var(--accent);color:var(--accent);}
.export-btn span{font-size:9px;color:var(--muted);}
.export-info{font-size:11px;color:var(--muted);margin-top:10px;line-height:1.5;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const STORAGE_KEY = 'consistencia_v2';

function loadData() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}'); } catch { return {}; } }
function saveData(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }
function todayKey() { return new Date().toISOString().slice(0,10); }
function formatDate(d) { return new Date(d+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'}); }
function getWeekDays() {
  const today=new Date(); const day=today.getDay();
  const monday=new Date(today); monday.setDate(today.getDate()-(day===0?6:day-1));
  return Array.from({length:7},(_,i)=>{const d=new Date(monday);d.setDate(monday.getDate()+i);return d.toISOString().slice(0,10);});
}
function avg(arr) { if(!arr.length) return null; return (arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1); }
const defaultEntry = () => ({semSubstancia:false,sono:7,energia:7,fissura:3,execCorpo:false,execMente:false,execEsp:false,execRotina:false,socialLeve:null,excessoIntensidade:null,observacao:''});

function downloadCSV(filename, rows) {
  const csv=rows.map(r=>r.map(c=>`"${String(c??'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;a.click();
  URL.revokeObjectURL(url);
}
function exportChecks(data) {
  const entries=Object.values(data).filter(e=>e&&e.date&&e.date.length===10).sort((a,b)=>a.date.localeCompare(b.date));
  if(!entries.length){alert('Nenhum check registrado ainda.');return;}
  const header=['data','sem_substancia','sono','energia','fissura','exec_corpo','exec_mente','exec_espiritualidade','exec_rotina','social_leve','excesso_intensidade','observacao'];
  const rows=entries.map(e=>[e.date,e.semSubstancia?'sim':'nao',e.sono,e.energia,e.fissura,e.execCorpo?'sim':'nao',e.execMente?'sim':'nao',e.execEsp?'sim':'nao',e.execRotina?'sim':'nao',e.socialLeve===true?'sim':e.socialLeve===false?'nao':'',e.excessoIntensidade===true?'sim':e.excessoIntensidade===false?'nao':'',e.observacao||'']);
  downloadCSV(`checks_${todayKey()}.csv`,[header,...rows]);
}
function exportTreinos(data) {
  const treinos=Object.entries(data).filter(([k])=>k.startsWith('treino_')).map(([,v])=>v).sort((a,b)=>a.date.localeCompare(b.date));
  if(!treinos.length){alert('Nenhum treino registrado ainda.');return;}
  const header=['data','dia_sequencial','digitos_usados'];
  const rows=treinos.map((t,i)=>[t.date,i+1,4+Math.floor(i/5)]);
  downloadCSV(`treinos_${todayKey()}.csv`,[header,...rows]);
}

function gerarSequencia(digits){return Array.from({length:digits},()=>Math.floor(Math.random()*10)).join('');}
function getControleInstrucao(d){
  if(d<10)return{instrucao:'Conte de 1 a 50.\nQuando chegar em múltiplos de 3, diga "X" em vez do número.',exemplo:'1, 2, X, 4, 5, X, 7...'};
  if(d<20)return{instrucao:'Conte de 1 a 50.\nMúltiplos de 3 → "X"\nMúltiplos de 5 → "Z"',exemplo:'1, 2, X, 4, Z, X, 7...'};
  if(d<30)return{instrucao:'Conte de 50 a 1 (regressivo).\nMúltiplos de 3 → "X"\nMúltiplos de 7 → "Z"',exemplo:'50, 49, X, 47...'};
  return{instrucao:'Alterne: some 3 na ida, subtraia 7 na volta.\nInicie em 1, vá até 40 e volte.',exemplo:'1→4→7... depois 40→33→26...'};
}

function TodayRules(){
  return(
    <div className="rules-block">
      <div className="rules-title">TODAY RULES</div>
      <ul className="rules-list">
        {['Faça mesmo sem vontade','Não complique','Não acelere','Não relaxe','Quebrou? volta no dia seguinte'].map((r,i)=>(
          <li key={i}><span>{i+1}.</span><span>{r}</span></li>
        ))}
      </ul>
    </div>
  );
}

function TreinoDia({data,setData}){
  const key=todayKey();
  const treinoDone=data[`treino_${key}`];
  const diasConcluidos=Object.keys(data).filter(k=>k.startsWith('treino_')).length;
  const digits=4+Math.floor(diasConcluidos/5);
  const [bloco,setBloco]=useState(0);
  const [fase,setFase]=useState('show');
  const [seq,setSeq]=useState(()=>gerarSequencia(digits));
  const [userInput,setUserInput]=useState('');
  const [feedback,setFeedback]=useState(null);
  const [timerSec,setTimerSec]=useState(3*60);
  const [timerRunning,setTimerRunning]=useState(false);
  const [timerConfig,setTimerConfig]=useState(3);
  const timerRef=useRef(null);
  const controle=getControleInstrucao(diasConcluidos);

  useEffect(()=>{
    if(timerRunning&&bloco===1){
      timerRef.current=setInterval(()=>setTimerSec(s=>{if(s<=1){clearInterval(timerRef.current);setTimerRunning(false);return 0;}return s-1;}),1000);
    }
    return()=>clearInterval(timerRef.current);
  },[timerRunning,bloco]);

  function startTimer(min){setTimerSec(min*60);setTimerConfig(min);setTimerRunning(true);}
  function handleMemNext(){
    if(fase==='show'){setFase('input');setUserInput('');return;}
    const correct=userInput.trim()===seq;
    setFeedback(correct?'ok':'err');
    setTimeout(()=>{setFeedback(null);setSeq(gerarSequencia(digits));setFase('show');setUserInput('');},1200);
  }
  function finalizarTreino(){
    const nd={...data,[`treino_${key}`]:{date:key}};
    setData(nd);saveData(nd);setBloco(4);
  }

  if(treinoDone)return(
    <div style={{background:'var(--surface)',border:'1px solid var(--green)',borderRadius:8,padding:20,textAlign:'center',marginBottom:20}}>
      <div style={{color:'var(--green)',fontFamily:'JetBrains Mono',fontSize:12,marginBottom:8}}>✓ TREINO CONCLUÍDO HOJE</div>
      <div style={{color:'var(--muted)',fontSize:13}}>{diasConcluidos} dias de treino no total</div>
      <div style={{color:'var(--muted)',fontSize:11,marginTop:8,fontFamily:'JetBrains Mono'}}>dígitos atuais: {digits}</div>
    </div>
  );

  if(bloco===4)return(
    <div className="treino-done">
      <div className="treino-done-title">Feito = sucesso.</div>
      <div style={{color:'var(--muted)',fontSize:13,marginTop:8}}>Treino #{diasConcluidos} concluído.</div>
    </div>
  );

  return(
    <div>
      <div className="bloco-nav">
        {['MEM','FOCO','CONTROLE','LEITURA'].map((l,i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:4}}>
            <div className={`bloco-dot ${i===bloco?'active':i<bloco?'done':''}`}/>
            <span style={{fontSize:9,fontFamily:'JetBrains Mono',color:i===bloco?'var(--accent)':i<bloco?'var(--green)':'var(--border)'}}>{l}</span>
          </div>
        ))}
      </div>

      {bloco===0&&(
        <div className="treino-card">
          <div className="treino-block-title">BLOCO 1 — MEMÓRIA</div>
          <div className="treino-block-sub">Memorize a sequência e depois digite-a.</div>
          <div className="progress-row"><span>Dígitos: {digits}</span><span>{diasConcluidos} dias concluídos</span></div>
          {fase==='show'&&(<><div className="treino-seq">{seq}</div><button className="save-btn" onClick={handleMemNext}>Memoriei → Digitar</button></>)}
          {fase==='input'&&(
            <>
              <div style={{textAlign:'center',color:'var(--muted)',fontSize:12,padding:'16px 0',fontFamily:'JetBrains Mono'}}>Digite a sequência:</div>
              <input className="treino-input" type="text" inputMode="numeric" placeholder="0000" value={userInput} onChange={e=>setUserInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')handleMemNext();}} autoFocus/>
              {feedback==='ok'&&<div className="feedback-ok">✓ CORRETO</div>}
              {feedback==='err'&&<div className="feedback-err">✗ ERRADO — ok, continue</div>}
              {!feedback&&<button className="save-btn" onClick={handleMemNext}>Confirmar</button>}
              <button className="sec-btn" onClick={()=>{setSeq(gerarSequencia(digits));setFase('show');setUserInput('');}}>Nova sequência</button>
            </>
          )}
          <button className="sec-btn" style={{marginTop:16}} onClick={()=>setBloco(1)}>Ir para Foco →</button>
        </div>
      )}

      {bloco===1&&(
        <div className="treino-card">
          <div className="treino-block-title">BLOCO 2 — FOCO</div>
          <div className="treino-block-sub">Atenção sustentada. Sem distrações.</div>
          {!timerRunning&&timerSec===timerConfig*60?(
            <>
              <div className="treino-instrucao">Foque na sua respiração.<br/>Inspire 4s. Expire 6s.</div>
              <div style={{display:'flex',gap:8,marginBottom:16}}>
                {[3,5].map(m=>(<button key={m} className="sec-btn" style={{margin:0}} onClick={()=>startTimer(m)}>{m} min</button>))}
              </div>
            </>
          ):(
            <>
              <div className="treino-timer">{String(Math.floor(timerSec/60)).padStart(2,'0')}:{String(timerSec%60).padStart(2,'0')}</div>
              <div className="timer-bar"><div className="timer-bar-fill" style={{width:`${(timerSec/(timerConfig*60))*100}%`}}/></div>
              <div style={{textAlign:'center',color:'var(--muted)',fontSize:12,marginBottom:16}}>Foque na respiração.</div>
              {timerSec===0&&<div className="success-msg" style={{marginBottom:12}}>✓ Tempo concluído</div>}
            </>
          )}
          <button className="sec-btn" onClick={()=>setBloco(2)}>{timerSec===0?'Ir para Controle →':'Pular'}</button>
        </div>
      )}

      {bloco===2&&(
        <div className="treino-card">
          <div className="treino-block-title">BLOCO 3 — CONTROLE MENTAL</div>
          <div className="treino-block-sub">Controle inibitório. Execute mentalmente.</div>
          <div className="treino-instrucao">{controle.instrucao}</div>
          <div style={{fontFamily:'JetBrains Mono',fontSize:11,color:'var(--muted)',textAlign:'center',marginBottom:20}}>ex: {controle.exemplo}</div>
          <button className="save-btn" onClick={()=>setBloco(3)}>Concluí → Leitura</button>
        </div>
      )}

      {bloco===3&&(
        <div className="treino-card">
          <div className="treino-block-title">BLOCO 4 — LEITURA</div>
          <div className="treino-block-sub">Foco sustentado e organização mental.</div>
          <div className="treino-instrucao">Leia 1 página de qualquer livro ou texto.<br/><br/>Depois resuma mentalmente:<br/>o que foi dito em 3 frases.</div>
          <button className="save-btn" style={{marginTop:20}} onClick={finalizarTreino}>Finalizar Treino</button>
        </div>
      )}
    </div>
  );
}

function CheckDiario({data,setData}){
  const key=todayKey();
  const existing=data[key];
  const [editing,setEditing]=useState(false);
  const [entry,setEntry]=useState(existing||defaultEntry());
  const [saved,setSaved]=useState(false);
  const set=(field,val)=>setEntry(e=>({...e,[field]:val}));

  function handleSave(){
    const nd={...data,[key]:{...entry,date:key}};
    setData(nd);saveData(nd);setSaved(true);setEditing(false);
    setTimeout(()=>setSaved(false),3000);
  }

  if(existing&&!editing)return(
    <div>
      <TodayRules/>
      <div className="already-done">
        <div className="already-done-title">✓ DIA REGISTRADO</div>
        <div className="already-done-sub">{formatDate(key)}</div>
        <button className="edit-link" onClick={()=>{setEntry(existing);setEditing(true);}}>editar registro</button>
      </div>
    </div>
  );

  const execs=[{key:'execCorpo',label:'Corpo'},{key:'execMente',label:'Mente'},{key:'execEsp',label:'Espirit.'},{key:'execRotina',label:'Rotina'}];
  return(
    <div>
      <TodayRules/>
      <div className="date-header">{formatDate(key).toUpperCase()}</div>
      <p className="section-title">CHECK DO DIA</p>
      <div className="field">
        <div className={`checkbox-row ${entry.semSubstancia?'checked':''}`} onClick={()=>set('semSubstancia',!entry.semSubstancia)}>
          <div className="custom-checkbox">{entry.semSubstancia&&<span className="check-mark">✓</span>}</div>
          <span style={{fontSize:13}}>Sem substância hoje</span>
        </div>
      </div>
      {[{key:'sono',label:'Sono'},{key:'energia',label:'Energia'},{key:'fissura',label:'Fissura / desejo'}].map(f=>(
        <div className="field" key={f.key}>
          <label className="field-label">{f.label} <span>0–10</span></label>
          <div className="slider-wrap">
            <input type="range" className="slider" min="0" max="10" value={entry[f.key]} onChange={e=>set(f.key,Number(e.target.value))}/>
            <span className="slider-value">{entry[f.key]}</span>
          </div>
        </div>
      ))}
      <div className="field">
        <label className="field-label">Execução</label>
        <div className="exec-chips">
          {execs.map(ex=>(<div key={ex.key} className={`exec-chip ${entry[ex.key]?'checked':''}`} onClick={()=>set(ex.key,!entry[ex.key])}>{ex.label}</div>))}
        </div>
      </div>
      {[{key:'socialLeve',label:'Social leve'},{key:'excessoIntensidade',label:'Excesso de intensidade'}].map(f=>(
        <div className="field" key={f.key}>
          <label className="field-label">{f.label}</label>
          <div className="yn-row">
            <button className={`yn-btn ${entry[f.key]===true?'selected-yes':''}`} onClick={()=>set(f.key,entry[f.key]===true?null:true)}>SIM</button>
            <button className={`yn-btn ${entry[f.key]===false?'selected-no':''}`} onClick={()=>set(f.key,entry[f.key]===false?null:false)}>NÃO</button>
          </div>
        </div>
      ))}
      <div className="field">
        <label className="field-label">Observação do dia</label>
        <textarea className="obs-input" rows={3} placeholder="o que aconteceu hoje?" value={entry.observacao} onChange={e=>set('observacao',e.target.value)}/>
      </div>
      <button className="save-btn" onClick={handleSave}>Salvar dia</button>
      {saved&&<div className="success-msg">✓ REGISTRADO</div>}
    </div>
  );
}

function Home({data,setData,setTab}){
  const key=todayKey();
  const checkDone=!!data[key];
  const treinoDone=!!data[`treino_${key}`];
  const diasConcluidos=Object.keys(data).filter(k=>k.startsWith('treino_')).length;
  const digits=4+Math.floor(diasConcluidos/5);
  const totalChecks=Object.values(data).filter(e=>e&&e.date&&e.date.length===10).length;

  return(
    <div>
      <TodayRules/>
      <p className="section-title">HOJE</p>
      <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:24}}>
        <div style={{background:'var(--surface)',border:`1px solid ${treinoDone?'var(--green)':'var(--border)'}`,borderRadius:8,padding:16,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontSize:13,color:treinoDone?'var(--green)':'var(--text)',marginBottom:2}}>Treino Cognitivo</div>
            <div style={{fontSize:11,color:'var(--muted)',fontFamily:'JetBrains Mono'}}>{treinoDone?`✓ concluído · dia #${diasConcluidos}`:`~10min · ${digits} dígitos`}</div>
          </div>
          {!treinoDone&&<button className="sec-btn" style={{width:'auto',padding:'8px 16px',margin:0}} onClick={()=>setTab('treino')}>Iniciar</button>}
          {treinoDone&&<span style={{color:'var(--green)',fontSize:18}}>✓</span>}
        </div>
        <div style={{background:'var(--surface)',border:`1px solid ${checkDone?'var(--green)':'var(--border)'}`,borderRadius:8,padding:16,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontSize:13,color:checkDone?'var(--green)':'var(--text)',marginBottom:2}}>Check Diário</div>
            <div style={{fontSize:11,color:'var(--muted)',fontFamily:'JetBrains Mono'}}>{checkDone?'✓ registrado':'< 1 min'}</div>
          </div>
          {!checkDone&&<button className="sec-btn" style={{width:'auto',padding:'8px 16px',margin:0}} onClick={()=>setTab('check')}>Fazer</button>}
          {checkDone&&<span style={{color:'var(--green)',fontSize:18}}>✓</span>}
        </div>
      </div>
      <div style={{fontSize:11,fontFamily:'JetBrains Mono',color:'var(--muted)',textAlign:'center',marginBottom:24}}>
        {treinoDone&&checkDone?'✓ Tudo feito hoje.':!treinoDone&&!checkDone?'Nada feito ainda.':treinoDone?'Falta o check.':'Falta o treino.'}
      </div>
      <div className="export-block">
        <div className="export-title">EXPORTAR DADOS</div>
        <div className="export-row">
          <button className="export-btn" onClick={()=>exportChecks(data)}>↓ checks.csv<span>{totalChecks} registros</span></button>
          <button className="export-btn" onClick={()=>exportTreinos(data)}>↓ treinos.csv<span>{diasConcluidos} treinos</span></button>
        </div>
        <div className="export-info">CSV compatível com Excel, Google Sheets e agentes de IA.</div>
      </div>
    </div>
  );
}

function Calendario({data}){
  const [viewDate,setViewDate]=useState(new Date());
  const year=viewDate.getFullYear();const month=viewDate.getMonth();
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const todayStr=todayKey();
  const offset=firstDay===0?6:firstDay-1;
  const cells=[];
  for(let i=0;i<offset;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++){
    const k=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    cells.push({day:d,key:k});
  }
  const monthName=viewDate.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
  const pfx=`${year}-${String(month+1).padStart(2,'0')}`;
  const filled=Object.keys(data).filter(k=>!k.startsWith('treino_')&&!k.startsWith('resumo_')&&k.startsWith(pfx)).length;
  const trained=Object.keys(data).filter(k=>k.startsWith(`treino_${pfx}`)).length;

  return(
    <div>
      <div className="cal-header">
        <button className="cal-nav" onClick={()=>setViewDate(d=>new Date(d.getFullYear(),d.getMonth()-1,1))}>‹</button>
        <div style={{textAlign:'center'}}>
          <div className="cal-month">{monthName.toUpperCase()}</div>
          <div style={{fontSize:10,color:'var(--muted)',fontFamily:'JetBrains Mono',marginTop:2}}>check {filled}/{daysInMonth} · treino {trained}/{daysInMonth}</div>
        </div>
        <button className="cal-nav" onClick={()=>setViewDate(d=>new Date(d.getFullYear(),d.getMonth()+1,1))}>›</button>
      </div>
      <div className="cal-grid">
        {['SEG','TER','QUA','QUI','SEX','SÁB','DOM'].map(d=>(<div key={d} className="cal-day-name">{d}</div>))}
        {cells.map((cell,i)=>{
          if(!cell)return<div key={`e-${i}`} className="cal-day empty-slot"/>;
          const isToday=cell.key===todayStr;
          const isFilled=!!data[cell.key];
          const isTrained=!!data[`treino_${cell.key}`];
          return(<div key={cell.key} className={`cal-day ${isFilled?'filled':''} ${isTrained&&!isFilled?'trained':''} ${isToday?'today':''}`}>{cell.day}</div>);
        })}
      </div>
      <div style={{display:'flex',gap:16,marginTop:16,fontSize:11,color:'var(--muted)',fontFamily:'JetBrains Mono'}}>
        <span><span style={{color:'var(--green)'}}>■</span> check feito</span>
        <span><span style={{color:'var(--accent)'}}>■</span> só treino</span>
      </div>
    </div>
  );
}

function Semanal({data,aiAnalysis,setAiAnalysis}){
  const [loading,setLoading]=useState(false);
  const weekDays=getWeekDays();
  const weekEntries=weekDays.map(d=>data[d]).filter(Boolean);
  const weekTreinos=weekDays.filter(d=>data[`treino_${d}`]).length;
  const avgSono=avg(weekEntries.map(e=>e.sono));
  const avgEnergia=avg(weekEntries.map(e=>e.energia));
  const avgFissura=avg(weekEntries.map(e=>e.fissura));
  const execTotal=weekEntries.reduce((acc,e)=>acc+[e.execCorpo,e.execMente,e.execEsp,e.execRotina].filter(Boolean).length,0);
  const execPct=weekEntries.length>0?Math.round((execTotal/(weekEntries.length*4))*100):0;
  const consistenciaPct=Math.round((weekEntries.length/7)*100);
  let status='green';
  if(consistenciaPct<60||(avgFissura&&Number(avgFissura)>6))status='red';
  else if(consistenciaPct<80||(avgEnergia&&Number(avgEnergia)<5))status='yellow';
  const statusLabels={green:'CONSISTÊNCIA BOA',yellow:'ATENÇÃO',red:'RISCO'};

  async function gerarAnalise(){
    if(!weekEntries.length)return;
    setLoading(true);
    const resumo=weekEntries.map(e=>{
      const execs=[e.execCorpo&&'corpo',e.execMente&&'mente',e.execEsp&&'espiritualidade',e.execRotina&&'rotina'].filter(Boolean);
      return `${e.date}: sono=${e.sono} energia=${e.energia} fissura=${e.fissura} exec=[${execs.join(',')||'nenhuma'}] subst=${e.semSubstancia?'não':'SIM'} obs="${e.observacao||''}"`;
    }).join('\n');
    const prompt=`Você é um analista clínico direto. Analise estes dados de hábitos e treino cognitivo da semana e gere um parecer objetivo em máximo 5 linhas. Sem elogios. Identifique padrões e riscos.\n\nDados:\n${resumo}\n\nTreinos feitos: ${weekTreinos}/7\nMédias: sono=${avgSono} energia=${avgEnergia} fissura=${avgFissura} exec=${execPct}% consistência=${consistenciaPct}%`;
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
      const d=await res.json();
      setAiAnalysis(d.content?.find(c=>c.type==='text')?.text||'Sem resposta.');
    }catch{setAiAnalysis('Erro ao gerar análise.');}
    setLoading(false);
  }

  return(
    <div>
      <p className="section-title">SEMANA ATUAL</p>
      <div className={`status-badge ${status}`}>
        <span>●</span><span>{statusLabels[status]}</span>
        <span style={{marginLeft:4,opacity:.6}}>{weekEntries.length}/7 dias · treino {weekTreinos}/7</span>
      </div>
      <div className="stat-grid">
        <div className="stat-card"><div className="stat-label">SONO MÉDIO</div><div className={`stat-value ${avgSono>=7?'good':avgSono>=5?'warn':'bad'}`}>{avgSono??'—'}</div></div>
        <div className="stat-card"><div className="stat-label">ENERGIA MÉDIA</div><div className={`stat-value ${avgEnergia>=7?'good':avgEnergia>=5?'warn':'bad'}`}>{avgEnergia??'—'}</div></div>
        <div className="stat-card"><div className="stat-label">FISSURA MÉDIA</div><div className={`stat-value ${avgFissura<=3?'good':avgFissura<=6?'warn':'bad'}`}>{avgFissura??'—'}</div></div>
        <div className="stat-card"><div className="stat-label">EXECUÇÃO</div><div className={`stat-value ${execPct>=70?'good':execPct>=40?'warn':'bad'}`}>{execPct}%</div></div>
      </div>
      <p className="section-title" style={{marginTop:16}}>ANÁLISE IA</p>
      {aiAnalysis&&<div className="ai-block"><div className="ai-label">PARECER DA SEMANA</div><div className="ai-text">{aiAnalysis}</div></div>}
      <button className="sec-btn" onClick={gerarAnalise} disabled={loading||!weekEntries.length}>
        {loading?'Analisando...':weekEntries.length?'Gerar análise da semana':'Sem dados esta semana'}
      </button>
    </div>
  );
}

function Mensal({data,setData}){
  const now=new Date();
  const prefix=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const monthEntries=Object.values(data).filter(e=>e&&e.date?.startsWith(prefix));
  const daysInMonth=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const treinos=Object.keys(data).filter(k=>k.startsWith(`treino_${prefix}`)).length;
  const avgEnergia=avg(monthEntries.map(e=>e.energia));
  const evolFissura=(()=>{
    if(monthEntries.length<2)return null;
    const sorted=[...monthEntries].sort((a,b)=>a.date.localeCompare(b.date));
    const half=Math.ceil(sorted.length/2);
    const f1=avg(sorted.slice(0,half).map(e=>e.fissura));
    const f2=avg(sorted.slice(half).map(e=>e.fissura));
    const diff=(Number(f2)-Number(f1)).toFixed(1);
    return diff>0?`+${diff} ↑`:`${diff} ↓`;
  })();
  const resumoKey=`resumo_${prefix}`;
  const [resumo,setResumo]=useState(data[resumoKey]||'');
  function salvarResumo(){const nd={...data,[resumoKey]:resumo};setData(nd);saveData(nd);}

  return(
    <div>
      <p className="section-title">{now.toLocaleDateString('pt-BR',{month:'long',year:'numeric'}).toUpperCase()}</p>
      <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:'4px 16px',marginBottom:20}}>
        <div className="month-stat"><span className="month-stat-label">Checks feitos</span><span className="month-stat-value">{monthEntries.length}/{daysInMonth}</span></div>
        <div className="month-stat"><span className="month-stat-label">Treinos feitos</span><span className="month-stat-value">{treinos}/{daysInMonth}</span></div>
        <div className="month-stat"><span className="month-stat-label">Energia média</span><span className="month-stat-value">{avgEnergia??'—'}</span></div>
        <div className="month-stat"><span className="month-stat-label">Evolução fissura</span><span className="month-stat-value" style={{color:evolFissura?.includes('↑')?'var(--red)':'var(--green)'}}>{evolFissura??'—'}</span></div>
      </div>
      <p className="section-title">REFLEXÃO DO MÊS</p>
      <textarea className="obs-input" rows={6} placeholder="Como foi este mês? O que funcionou? O que precisa mudar?" value={resumo} onChange={e=>setResumo(e.target.value)}/>
      <button className="save-btn" style={{marginTop:12}} onClick={salvarResumo}>Salvar reflexão</button>
    </div>
  );
}

function App(){
  const [tab,setTab]=useState('home');
  const [data,setData]=useState(loadData);
  const [aiAnalysis,setAiAnalysis]=useState('');
  const tabs=[{id:'home',label:'HOME'},{id:'treino',label:'TREINO'},{id:'check',label:'CHECK'},{id:'cal',label:'MÊS'},{id:'semana',label:'SEMANA'},{id:'balanco',label:'BALANÇO'}];
  return(
    <div className="app">
      <nav className="nav">
        {tabs.map(t=>(<button key={t.id} className={`nav-btn ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>{t.label}</button>))}
      </nav>
      <main className="main">
        {tab==='home'   &&<Home data={data} setData={setData} setTab={setTab}/>}
        {tab==='treino' &&<TreinoDia data={data} setData={setData}/>}
        {tab==='check'  &&<CheckDiario data={data} setData={setData}/>}
        {tab==='cal'    &&<Calendario data={data}/>}
        {tab==='semana' &&<Semanal data={data} aiAnalysis={aiAnalysis} setAiAnalysis={setAiAnalysis}/>}
        {tab==='balanco'&&<Mensal data={data} setData={setData}/>}
      </main>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
